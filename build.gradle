plugins {
    id 'java'
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

sourceSets {
    main {
        java {
            srcDirs = ['src', 'playground']
        }
    }
    test {
        java {
            srcDirs = ['tests']
        }
    }
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}

// JShell でメソッドを対話的に試す（完全修飾名で呼ぶ例: chapter01.Exercises.problem1_1()）
// exec で bash を JShell に置き換えることで TTY を引き継ぎ、上矢印ヒストリが使えるようにする
tasks.register('jshell', Exec) {
    group = 'playground'
    description = 'JShell を起動してメソッドを対話的に試す'
    dependsOn compileJava
    commandLine 'bash', '-c',
        "exec jshell --class-path ${sourceSets.main.output.classesDirs.asPath} --startup DEFAULT"
}

// 各章専用の JShell タスク（その章だけ import するため Exercises が曖昧にならない）
(1..9).each { n ->
    def chapterNum = String.format('%02d', n)
    tasks.register("jshellChapter${chapterNum}", Exec) {
        group = 'playground'
        description = "Chapter ${chapterNum} 専用の JShell を起動する"
        dependsOn compileJava
        doFirst {
            file(".jshell-chapter${chapterNum}.jsh").text = "import chapter${chapterNum}.*;\n"
        }
        commandLine 'bash', '-c',
            "exec jshell --class-path ${sourceSets.main.output.classesDirs.asPath} --startup DEFAULT --startup .jshell-chapter${chapterNum}.jsh"
        doLast {
            file(".jshell-chapter${chapterNum}.jsh").delete()
        }
    }
}

// 各章のプレイグラウンドを実行するタスク
(1..9).each { n ->
    def chapterNum = String.format('%02d', n)
    tasks.register("runChapter${chapterNum}", JavaExec) {
        group = 'playground'
        description = "Chapter ${chapterNum} プレイグラウンドを実行する"
        classpath = sourceSets.main.runtimeClasspath
        mainClass = "chapter${chapterNum}.Playground"
        dependsOn compileJava
    }
}
